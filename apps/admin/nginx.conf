server {
  listen 8080 default_server;
  server_name _;

  root /usr/share/nginx/html;

  # The admin SPA is mounted under /manage. Vite emits assets with a
  # /manage/ base, so the static files live under /manage on disk too.

  # SPA fallback: any unknown path under /manage falls back to the admin
  # index so client-side routing (react-router basename "/manage") works.
  location /manage/ {
    try_files $uri $uri/ /manage/index.html;
  }

  # Bare /manage -> /manage/ so the index loads with the trailing slash.
  location = /manage {
    return 301 /manage/;
  }

  # Cache hashed Vite assets aggressively.
  location /manage/assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Liveness for the readiness probe.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Root redirects to the management entrypoint when this image is served
  # standalone. Behind the platform ingress, /api and / route elsewhere.
  location = / {
    return 302 /manage/;
  }

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
