server {
  listen 8080 default_server;
  # No server_name: the Ingress controller routes by host.

  root /usr/share/nginx/html;
  index index.html;

  # SPA: any unknown path falls back to index.html so client-side routing works.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache hashed Vite assets aggressively.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Liveness for the readiness probe.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # Gzip on for static delivery.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}
