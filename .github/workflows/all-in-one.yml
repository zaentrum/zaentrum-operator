# Build the Stube all-in-one image and push it to GitHub Container Registry.
#
# The all-in-one bundles a single-node k3s (FROM rancher/k3s) plus the rendered
# deploy/base manifests, so `docker run` installs a whole Stube cluster in one
# container. It is published as:
#   ghcr.io/nalet/stube:latest
#   ghcr.io/nalet/stube:<git-sha>
#
# It chains off build-images: once the component images exist for a commit on
# main, this assembles the bundle that references them. It can also be run by
# hand (workflow_dispatch) and on direct pushes to main that touch the bundle.
name: all-in-one

on:
  # Run after the component images finish building on the default branch.
  workflow_run:
    workflows: [build-images]
    types: [completed]
    branches: [main]
  # Also (re)build when the bundle itself changes on main.
  push:
    branches: [main]
    paths:
      - 'deploy/allinone/**'
      - 'deploy/base/**'
      - '.github/workflows/all-in-one.yml'
  # Manual trigger from the Actions tab.
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/nalet/stube

concurrency:
  group: all-in-one-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # When triggered by workflow_run, only proceed if build-images succeeded.
    # The push / workflow_dispatch triggers carry no workflow_run payload, so
    # the conclusion field is empty and the second clause lets them through.
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4

      # Render deploy/base into deploy/allinone/manifests so the k3s auto-apply
      # dir is populated before the docker build COPYs it in. build.sh does the
      # render with `kubectl kustomize` (kustomize ships inside kubectl).
      - name: Render manifests
        run: ./deploy/allinone/build.sh render

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push all-in-one
        uses: docker/build-push-action@v6
        with:
          context: deploy/allinone
          file: deploy/allinone/Dockerfile
          push: true
          # amd64 today. arm64 is a future matrix axis — add it here once the
          # component images publish arm64 too:
          #   platforms: linux/amd64,linux/arm64
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=all-in-one
          cache-to: type=gha,mode=max,scope=all-in-one
