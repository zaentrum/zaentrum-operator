name: ci

on:
  push: { branches: [main] }
  pull_request: {}

jobs:
  # kind's real job: smoke-test that the manifests apply on a throwaway
  # vanilla cluster (NOT a runtime — see docs/architecture.md).
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: kustomize build (base + demo)
        run: |
          kubectl kustomize deploy/base   > /tmp/base.yaml
          kubectl kustomize deploy/overlays/demo > /tmp/demo.yaml
          echo "rendered $(grep -c '^kind:' /tmp/base.yaml) base resources"
      - uses: helm/kind-action@v1
        with: { cluster_name: zaentrum-ci }
      - name: apply base on kind
        run: |
          kubectl apply -k deploy/base --dry-run=server || \
          kubectl apply -k deploy/base   # images may be private until first release
          kubectl -n zaentrum get all

  # The platform-owned images (apps/admin, platform/keycloak, operator) are built
  # + pushed by .github/workflows/build-images.yml; the all-in-one bundle by
  # .github/workflows/all-in-one.yml. The service/client images are built by their
  # own repos at github.com/zaentrum/<svc> (this meta-repo only references them).
  # This job stays focused on the manifest smoke test.
