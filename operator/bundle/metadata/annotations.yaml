# OLM bundle annotations — describe this bundle to the Operator Lifecycle
# Manager / catalog. WIP / Stage 3: structure is in place, but this bundle is
# NOT a complete or validated catalog yet (see operator/bundle/README.md).
#
# These keys follow the registry+v1 bundle format. Stage 3 confirms the channel
# graph and adds the CRD manifest under ../manifests before this validates with
# `operator-sdk bundle validate`.
annotations:
  # The on-disk layout this bundle uses.
  operators.operatorframework.io.bundle.mediatype.v1: registry+v1
  operators.operatorframework.io.bundle.manifests.v1: manifests/
  operators.operatorframework.io.bundle.metadata.v1: metadata/

  # Package + channel graph.
  operators.operatorframework.io.bundle.package.v1: stube-operator
  operators.operatorframework.io.bundle.channels.v1: stable
  operators.operatorframework.io.bundle.channel.default.v1: stable

  # Minimum OLM/OCP this bundle targets. Stage 3 confirms the range.
  com.redhat.openshift.versions: "v4.14"

  # Non-standard marker so humans/tooling can tell this is a stub.
  stube.io/bundle-stage: "wip-stage-3"
