apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: stube-operator.v0.1.0
  namespace: placeholder                # OLM substitutes the install namespace
  annotations:
    capabilities: Basic Install
    categories: Streaming & Messaging
    containerImage: ghcr.io/zaentrum/operator:latest
    description: >-
      Stube is a neutral, self-hostable media client + server for a library you
      own and are entitled to stream. The operator reconciles a single Stube
      custom resource into the full platform (catalog core, per-product
      streaming backends, clients, bundled Postgres/Valkey/Kafka and OIDC).
    repository: https://github.com/zaentrum/stube
    support: https://github.com/zaentrum/stube/issues
    # alm-examples is the CR sample OperatorHub renders in the "Create instance"
    # form. Mirrors operator/config/samples/stube_v1alpha1_stube.yaml.
    alm-examples: |-
      [
        {
          "apiVersion": "stube.io/v1alpha1",
          "kind": "Stube",
          "metadata": {
            "name": "stube",
            "namespace": "stube"
          },
          "spec": {
            "channel": "stable",
            "version": "latest",
            "hostname": "stube.localhost",
            "identity": {
              "mode": "bundled",
              "clientId": "chino-web",
              "audience": "chino"
            },
            "storage": {
              "mediaSize": "50Gi"
            },
            "features": {
              "gpu": false,
              "kafka": true
            },
            "update": {
              "mode": "manual"
            }
          }
        }
      ]
spec:
  displayName: Stube
  description: |
    **Stube** is a neutral media client + server for a library you own and are
    entitled to stream. Bring your own files; Stube catalogs, processes, and
    streams them to clean clients on the web, phone/tablet, and TV.

    This operator manages a `Stube` custom resource and reconciles it into the
    same Kubernetes resources that `kubectl kustomize deploy/base` renders — one
    declarative, GitOps-friendly way to run the whole platform on any cluster.

    Set the public hostname, choose bundled or external OIDC, size your media
    storage, toggle GPU/Kafka, and pick a manual or automatic update mode — the
    operator drives the rest and reports progress on the CR status (`phase`,
    `currentVersion`, `availableUpdate`, and per-component readiness).

    The bundle is content-neutral: it ships only the platform. It never fetches
    content and has no downloaders or indexer integrations.
  maturity: alpha
  version: 0.1.0
  minKubeVersion: 1.27.0
  keywords:
    - self-hosted
    - media
    - kubernetes
    - streaming
    - catalog
  maintainers:
    - name: Stube maintainers
      email: maintainers@stube.invalid
  provider:
    name: Stube
  links:
    - name: Source
      url: https://github.com/zaentrum/stube
    - name: Documentation
      url: https://github.com/zaentrum/stube/blob/main/docs/operator.md
  # MPL-2.0, matching the repo LICENSE.
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true
  # ── CRDs this operator owns ────────────────────────────────────────────────
  # group/version/kind match operator/config/crd/stube.io_stubes.yaml.
  customresourcedefinitions:
    owned:
      - name: stubes.stube.io
        kind: Stube
        version: v1alpha1
        displayName: Stube
        description: >-
          A single Stube platform instance. The operator reconciles it into the
          full neutral platform (see deploy/base for the rendered resource set).
        specDescriptors:
          - path: channel
            displayName: Release Channel
            description: Release train consulted by auto-update (stable or edge).
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:select:stable
              - urn:alm:descriptor:com.tectonic.ui:select:edge
          - path: version
            displayName: Version
            description: Image tag applied to every ghcr.io/zaentrum/* image.
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - path: update.mode
            displayName: Update Mode
            description: Whether updates are applied manually or automatically.
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:select:manual
              - urn:alm:descriptor:com.tectonic.ui:select:auto
        statusDescriptors:
          - path: phase
            displayName: Phase
            description: High-level reconcile phase of the platform.
            x-descriptors:
              - urn:alm:descriptor:io.kubernetes.phase
          - path: currentVersion
            displayName: Current Version
            description: Image tag currently rolled out across the platform.
            x-descriptors:
              - urn:alm:descriptor:org.w3:link
          - path: availableUpdate
            displayName: Available Update
            description: A newer version available on the configured channel.
            x-descriptors:
              - urn:alm:descriptor:org.w3:link
  # ── Install strategy ───────────────────────────────────────────────────────
  # Deployment copied from operator/config/manager/manager.yaml.
  # clusterPermissions copied from operator/config/rbac/role.yaml, bound to the
  # serviceAccountName from operator/config/rbac/service_account.yaml.
  install:
    strategy: deployment
    spec:
      clusterPermissions:
        - serviceAccountName: stube-operator-controller-manager
          rules:
            # The Stube CR itself + status/finalizers.
            - apiGroups: ["stube.io"]
              resources: ["stubes"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["stube.io"]
              resources: ["stubes/status"]
              verbs: ["get", "update", "patch"]
            - apiGroups: ["stube.io"]
              resources: ["stubes/finalizers"]
              verbs: ["update"]
            # Namespace (cluster-scoped) — created/owned by the operator.
            - apiGroups: [""]
              resources: ["namespaces"]
              verbs: ["get", "list", "watch", "create", "update", "patch"]
            # Core namespaced kinds rendered by the templates.
            - apiGroups: [""]
              resources:
                - configmaps
                - secrets
                - services
                - serviceaccounts
                - persistentvolumeclaims
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # Workloads.
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["batch"]
              resources: ["jobs"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # Ingress.
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # RBAC the operator hands to katalog-manager-api (first-run config
            # propagation). A controller may only grant rights it already holds,
            # so it must carry these.
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # Leader election + event recording.
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: [""]
              resources: ["events"]
              verbs: ["create", "patch"]
      deployments:
        - name: stube-operator-controller-manager
          label:
            app.kubernetes.io/part-of: stube-operator
            control-plane: controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            template:
              metadata:
                labels:
                  control-plane: controller-manager
              spec:
                serviceAccountName: stube-operator-controller-manager
                securityContext:
                  runAsNonRoot: true
                  seccompProfile:
                    type: RuntimeDefault
                containers:
                  - name: manager
                    image: ghcr.io/zaentrum/operator:latest
                    command: ["/manager"]
                    args:
                      - --leader-elect
                      - --health-probe-bind-address=:8081
                      - --metrics-bind-address=:8080
                    ports:
                      - name: metrics
                        containerPort: 8080
                    securityContext:
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                        drop: ["ALL"]
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 500m
                        memory: 256Mi
                terminationGracePeriodSeconds: 10
  # ── relatedImages ──────────────────────────────────────────────────────────
  # For disconnected/mirrored installs. The operator image is pinned here; the
  # full neutral ghcr.io/zaentrum/<service> set is resolved by the operator
  # at the same release tag (spec.version) it reconciles.
  relatedImages:
    - name: operator
      image: ghcr.io/zaentrum/operator:latest
