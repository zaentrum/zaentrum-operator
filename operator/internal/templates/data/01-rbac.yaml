apiVersion: v1
kind: ServiceAccount
metadata:
  name: katalog-manager-api
  namespace: {{ .Namespace }}
  labels:
    app: katalog-manager-api
    app.kubernetes.io/part-of: stube
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: katalog-manager-api-config
  namespace: {{ .Namespace }}
  labels:
    app: katalog-manager-api
    app.kubernetes.io/part-of: stube
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  # Stube CR: the instance/update surface (GET/PATCH /api/manage/instance) reads
  # the CR + merge-patches its spec (channel / update.mode / apply). Read +
  # patch only; the operator owns create/delete + status.
  - apiGroups: ["stube.io"]
    resources: ["stubes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["stube.io"]
    resources: ["stubes/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: katalog-manager-api-config
  namespace: {{ .Namespace }}
  labels:
    app: katalog-manager-api
    app.kubernetes.io/part-of: stube
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: katalog-manager-api-config
subjects:
  - kind: ServiceAccount
    name: katalog-manager-api
    namespace: {{ .Namespace }}
