# DEV DEFAULTS — fine for a local appliance, CHANGE for anything exposed.
# Values mirror deploy/base secretGenerator (already base64 in data:).
apiVersion: v1
kind: Secret
metadata:
  name: stube-db
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/part-of: stube
type: Opaque
data:
  # user=stube  password=stube-dev-change-me
  user: c3R1YmU=
  password: c3R1YmUtZGV2LWNoYW5nZS1tZQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: stube-stream-signing
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/part-of: stube
type: Opaque
data:
  # MUST be valid base64 (chino-api/chino-stream base64-decode it; decodes to
  # 32 bytes here). Regenerate for anything exposed: openssl rand -base64 32
  key: WkdWMkxXOXViSGt0WTJoaGJtZGxMVzFsTFc1dmRDMW1iM0l0Y0hKdlpDRT0=
{{- if .Bundled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: stube-keycloak
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/part-of: stube
type: Opaque
data:
  # client-secret=stube-manager-dev-change-me  (stube-manager confidential client)
  client-secret: c3R1YmUtbWFuYWdlci1kZXYtY2hhbmdlLW1l
---
apiVersion: v1
kind: Secret
metadata:
  name: stube-keycloak-admin
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/part-of: stube
type: Opaque
data:
  # username=admin password=dev realm-admin-password=dev
  username: YWRtaW4=
  password: ZGV2
  realm-admin-password: ZGV2
{{- end }}
