apiVersion: v1
kind: ConfigMap
metadata:
  name: stube-env
  namespace: {{ .Namespace }}
  labels:
    app.kubernetes.io/part-of: stube
data:
  # Bundled/external-IdP issuer. Every service runs OIDC discovery + token
  # validation against this with coreos/go-oidc, which requires it to EQUAL
  # both the discovery doc's `issuer` and the token `iss`. In bundled mode the
  # operator pins this, KC_HOSTNAME and the ingress host to the same name.
  OIDC_ISSUER: {{ .Issuer }}
  OIDC_AUDIENCE: {{ .Audience }}
  OIDC_ENABLED: "true"
  # In-cluster service DNS — never leaves the namespace.
  KATALOG_BASE_URL: http://katalog-api
  STREAM_BASE_URL: http://chino-stream
  MEDIA_ROOT: /var/lib/stube/media
  KAFKA_BROKERS: {{ if .Kafka }}kafka:9092{{ else }}""{{ end }}
  # Empty = no admins until the operator sets Keycloak subs / realm role.
  ADMIN_SUBJECTS: ""
{{- if .Bundled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: stube-keycloak-config
  namespace: {{ .Namespace }}
  labels:
    app: keycloak
    app.kubernetes.io/part-of: stube
data:
  # Pins the bundled Keycloak public base to <host>/auth so the discovery doc
  # issuer == OIDC_ISSUER == token iss.
  KC_HOSTNAME: {{ .KCHostname }}
{{- end }}
