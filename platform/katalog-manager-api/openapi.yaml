openapi: 3.0.3
info:
  title: Stube katalog-manager-api
  version: "1.0.0"
  description: >
    Neutral management API and first-run backend for Stube. Owns the catalog
    WRITE path (item edits, deletes, and the import scan that registers files
    the operator already owns on disk) plus service configuration. Processing
    work is dispatched asynchronously by emitting Kafka task events. This
    service is content-neutral: it never acquires, downloads, or fetches
    content. How files arrive on disk is out of scope.
servers:
  - url: /api/manage
    description: Route prefix the edge proxy forwards to this service.
tags:
  - name: setup
    description: First-run configuration contract (consumed by the admin UI).
  - name: config
    description: Live non-secret configuration.
  - name: import
    description: Register files the operator already owns. No acquisition.
  - name: library
    description: Catalog item write surface.
  - name: jobs
    description: Processing dispatch (Kafka task events) and job history.
  - name: ops
    description: Health and metrics.
paths:
  /setup/status:
    get:
      tags: [setup]
      summary: First-run status + dependency checks
      description: >
        Reachable without authentication so the admin UI can render the
        first-run wizard before any identity provider is configured. Returns
        only booleans and a version string.
      security: []
      responses:
        "200":
          description: Current setup status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
  /setup:
    post:
      tags: [setup]
      summary: Persist first-run configuration
      description: >
        Persists the operator's initial configuration and marks the install
        configured. If streamSigningKey is omitted, the server generates and
        persists one. Idempotent — re-running updates the stored config.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "200":
          description: Configured.
          content:
            application/json:
              schema:
                type: object
                properties:
                  configured:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /config:
    get:
      tags: [config]
      summary: Current non-secret configuration
      responses:
        "200":
          description: Current configuration (no secrets).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [config]
      summary: Update non-secret configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigUpdate"
      responses:
        "200":
          description: Updated configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Config"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Not yet configured; run first-run setup.
  /import/scan:
    post:
      tags: [import]
      summary: Scan a directory of owned files and register catalog items
      description: >
        Walks a directory inside the configured library root and registers each
        new media file as a catalog item with a primary playback asset. No
        downloading, no indexers, no remote fetch — it only reflects on-disk
        reality into the catalog. Idempotent: files already in the catalog are
        skipped.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
                  description: Directory within the configured library root.
                  example: /library/movies
      responses:
        "200":
          description: Scan summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Library path not configured.
  /library:
    get:
      tags: [library]
      summary: List catalog items (paged)
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [movie, series, season, episode, album, track, book]
        - name: q
          in: query
          description: Case-insensitive title contains-match.
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Page of items.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /items/{id}:
    put:
      tags: [library]
      summary: Update an item's editable fields (partial patch)
      parameters:
        - $ref: "#/components/parameters/ItemId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpdate"
      responses:
        "200":
          description: Updated item.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [library]
      summary: Delete an item
      description: >
        Removes the catalog record (and its composed asset/subtitle/segment
        rows). The underlying file the operator owns is left untouched on disk.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /jobs:
    get:
      tags: [jobs]
      summary: Recent job history (scans + processing dispatches)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
      responses:
        "200":
          description: Recent jobs, newest first.
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Job"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
  /items/{id}/transcode:
    post:
      tags: [jobs]
      summary: Enqueue a transcode pass
      description: >
        Emits a stube.processing.task.transcode event. The transcoder worker
        consumes it; this endpoint does not run the transcode.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "202":
          $ref: "#/components/responses/Enqueued"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Could not enqueue (broker unreachable).
  /items/{id}/package:
    post:
      tags: [jobs]
      summary: Enqueue a packaging pass
      description: Emits a stube.processing.task.package event.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "202":
          $ref: "#/components/responses/Enqueued"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Could not enqueue (broker unreachable).
  /items/{id}/enrich:
    post:
      tags: [jobs]
      summary: Trigger metadata enrichment
      description: Emits a stube.processing.task.enrich event.
      parameters:
        - $ref: "#/components/parameters/ItemId"
      responses:
        "202":
          $ref: "#/components/responses/Enqueued"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "502":
          description: Could not enqueue (broker unreachable).
  /healthz:
    get:
      tags: [ops]
      summary: Liveness/readiness probe
      description: Served at the server root (not under /api/manage).
      security: []
      servers:
        - url: /
      responses:
        "200":
          description: ok
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        OIDC access token. The issuer and audience are configured from the
        operator's environment / discovery document.
  parameters:
    ItemId:
      name: id
      in: path
      required: true
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    BadRequest:
      description: Invalid request body or parameters.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Enqueued:
      description: Work accepted and dispatched.
      content:
        application/json:
          schema:
            type: object
            properties:
              jobId:
                type: string
              itemId:
                type: string
              kind:
                type: string
              status:
                type: string
                example: queued
  schemas:
    SetupStatus:
      type: object
      properties:
        configured:
          type: boolean
        version:
          type: string
        checks:
          type: object
          properties:
            database:
              type: boolean
            kafka:
              type: boolean
            library:
              type: boolean
    SetupRequest:
      type: object
      required: [displayName, oidcIssuer, oidcClientId, libraryPath]
      properties:
        displayName:
          type: string
        oidcIssuer:
          type: string
        oidcClientId:
          type: string
        libraryPath:
          type: string
        streamSigningKey:
          type: string
          description: Optional. Generated and persisted if absent.
    Config:
      type: object
      properties:
        configured:
          type: boolean
        displayName:
          type: string
        oidcIssuer:
          type: string
        oidcClientId:
          type: string
        libraryPath:
          type: string
    ConfigUpdate:
      type: object
      required: [displayName, oidcIssuer, oidcClientId, libraryPath]
      properties:
        displayName:
          type: string
        oidcIssuer:
          type: string
        oidcClientId:
          type: string
        libraryPath:
          type: string
    Item:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        sort_title:
          type: string
        year:
          type: integer
          nullable: true
        rating:
          type: number
        description:
          type: string
        tagline:
          type: string
        duration_ms:
          type: integer
          format: int64
        season_number:
          type: integer
          nullable: true
        episode_number:
          type: integer
          nullable: true
        parent_id:
          type: string
    ItemUpdate:
      type: object
      description: Partial patch; omit a field to leave it unchanged.
      properties:
        title:
          type: string
        sort_title:
          type: string
        year:
          type: integer
        rating:
          type: number
        description:
          type: string
        tagline:
          type: string
    ListResult:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Item"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    ScanResult:
      type: object
      properties:
        jobId:
          type: string
        path:
          type: string
        status:
          type: string
        filesSeen:
          type: integer
        itemsInserted:
          type: integer
        itemsSkipped:
          type: integer
    Job:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [scan, transcode, package, enrich]
        status:
          type: string
          enum: [queued, running, done, failed]
        itemId:
          type: string
        startedAt:
          type: string
        finishedAt:
          type: string
        detail:
          type: string
    Error:
      type: object
      properties:
        error:
          type: string
security:
  - bearerAuth: []
