        app: postgres
    spec:
      containers:
      - env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: user
              name: stube-db-k88fgb59hk
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: stube-db-k88fgb59hk
        - name: POSTGRES_DB
          value: stube
