apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: chino-stream
    app.kubernetes.io/part-of: stube
    role: stream
  name: chino-stream
  namespace: stube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chino-stream
  template:
    metadata:
      labels:
        app: chino-stream
        role: stream
    spec:
      containers:
      - env:
        - name: LISTEN_ADDR
          value: :8080
        - name: KATALOG_API_BASE_URL
          value: http://katalog-api
        - name: MEDIA_ROOT
          value: /var/lib/stube/media
        - name: OIDC_ISSUER
          valueFrom:
            configMapKeyRef:
              key: OIDC_ISSUER
              name: stube-env-622d6kcm58
        - name: OIDC_AUDIENCE
          valueFrom:
            configMapKeyRef:
              key: OIDC_AUDIENCE
              name: stube-env-622d6kcm58
        - name: AUTH_ENABLED
          value: "true"
        - name: STREAM_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              key: key
              name: stube-stream-signing-7tt6mktkc4
        - name: USE_NVENC
          value: "false"
        - name: TRANSCODE_PRESET
          value: veryfast
        - name: HLS_CACHE_DIR
          value: /var/cache/stube-hls
        - name: FFMPEG_MAX_CONCURRENT
          value: "2"
        image: ghcr.io/nalet/stube/chino-stream:latest
        name: chino-stream
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - mountPath: /var/lib/stube/media
          name: media
          readOnly: true
        - mountPath: /var/cache/stube-hls
          name: hls-cache
      volumes:
      - name: media
        persistentVolumeClaim:
          claimName: media
      - emptyDir:
          sizeLimit: 5Gi
        name: hls-cache
---
