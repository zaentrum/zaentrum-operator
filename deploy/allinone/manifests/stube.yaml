apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: katalog-manager-api
    app.kubernetes.io/part-of: stube
    role: catalog-write
  name: katalog-manager-api
  namespace: stube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: katalog-manager-api
  template:
    metadata:
      labels:
        app: katalog-manager-api
        role: catalog-write
    spec:
      containers:
      - env:
        - name: ADDR
          value: :8080
        - name: KATALOG_API_BASE_URL
          value: http://katalog-api
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              key: user
              name: stube-db-k88fgb59hk
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: stube-db-k88fgb59hk
        - name: PG_URL
          value: postgres://$(DB_USER):$(DB_PASSWORD)@postgres:5432/stube?sslmode=disable
        - name: STREAM_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              key: key
              name: stube-stream-signing-55c926tf47
              optional: true
        - name: KEYCLOAK_BASE_URL
          value: http://keycloak/auth
        - name: KEYCLOAK_REALM
          value: stube
        - name: KEYCLOAK_ADMIN_CLIENT_ID
          value: stube-manager
        - name: KEYCLOAK_ADMIN_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              key: client-secret
              name: stube-keycloak-m2g5bdg8c7
        envFrom:
        - configMapRef:
            name: stube-env-bc6ctgt9bg
        image: ghcr.io/nalet/stube/katalog-manager-api:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        name: app
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 384Mi
          requests:
            cpu: 50m
            memory: 96Mi
      initContainers:
      - command:
        - sh
        - -c
        - |
          i=0
          until curl -sf -o /dev/null http://keycloak/auth/realms/stube/.well-known/openid-configuration; do
            i=$((i+1)); [ "$i" -ge 60 ] && { echo "bundled keycloak not present after 180s; proceeding"; exit 0; }
            echo "waiting for bundled keycloak ($i)…"; sleep 3
          done
          echo "bundled keycloak ready"
        image: curlimages/curl:8.11.0
        name: wait-for-oidc
      serviceAccountName: katalog-manager-api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: keycloak
    app.kubernetes.io/part-of: stube
    role: identity
  name: keycloak
  namespace: stube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: keycloak
        role: identity
    spec:
      containers:
      - args:
        - start
        - --import-realm
        env:
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL_HOST
          value: postgres
        - name: KC_DB_URL_DATABASE
          value: keycloak
        - name: KC_DB_USERNAME
          valueFrom:
            secretKeyRef:
              key: user
              name: stube-db-k88fgb59hk
        - name: KC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: stube-db-k88fgb59hk
        - name: KC_HTTP_ENABLED
          value: "true"
        - name: KC_HTTP_RELATIVE_PATH
          value: /auth
        - name: KC_PROXY_HEADERS
          value: xforwarded
        - name: KC_HOSTNAME
          valueFrom:
            configMapKeyRef:
              key: KC_HOSTNAME
              name: stube-keycloak-config
        - name: KC_HOSTNAME_STRICT
          value: "false"
        - name: KC_HEALTH_ENABLED
          value: "true"
        - name: KEYCLOAK_ADMIN
          valueFrom:
            secretKeyRef:
              key: username
              name: stube-keycloak-admin-75tt9m4mhm
        - name: KEYCLOAK_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: stube-keycloak-admin-75tt9m4mhm
        - name: STUBE_MANAGER_SECRET
          valueFrom:
            secretKeyRef:
              key: client-secret
              name: stube-keycloak-m2g5bdg8c7
        - name: STUBE_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              key: realm-admin-password
              name: stube-keycloak-admin-75tt9m4mhm
        image: ghcr.io/nalet/stube/keycloak:latest
        livenessProbe:
          failureThreshold: 6
          httpGet:
            path: /auth/health/live
            port: mgmt
          initialDelaySeconds: 90
          periodSeconds: 30
          timeoutSeconds: 5
        name: keycloak
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9000
          name: mgmt
        readinessProbe:
          failureThreshold: 30
          httpGet:
            path: /auth/health/ready
            port: mgmt
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: "2"
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 512Mi
        volumeMounts:
        - mountPath: /opt/keycloak/data/import
          name: realm-import
          readOnly: true
      initContainers:
      - args:
        - |
          set -eu
          until pg_isready -h postgres -U "$PGUSER" >/dev/null 2>&1; do
            echo "waiting for postgres…"; sleep 2
          done
          if psql -h postgres -U "$PGUSER" -tAc \
               "SELECT 1 FROM pg_database WHERE datname='keycloak'" \
               | grep -q 1; then
            echo "database keycloak already exists"
          else
            echo "creating database keycloak"
            createdb -h postgres -U "$PGUSER" keycloak
          fi
        command:
        - /bin/sh
        - -c
        env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              key: user
              name: stube-db-k88fgb59hk
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: stube-db-k88fgb59hk
        image: postgres:16-alpine
        name: create-keycloak-db
      volumes:
      - configMap:
          name: keycloak-realm
        name: realm-import
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: postgres
