    role: frontend
  name: admin
  namespace: stube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
        role: frontend
    spec:
      containers:
      - image: ghcr.io/nalet/stube/admin:latest
        name: app
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 1
          periodSeconds: 10
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 25m
            memory: 32Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: chino-api
    app.kubernetes.io/part-of: stube
    role: backend
  name: chino-api
  namespace: stube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chino-api
  template:
    metadata:
      labels:
        app: chino-api
        role: backend
    spec:
      containers:
      - env:
        - name: ADDR
          value: :8080
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              key: user
              name: stube-db-k88fgb59hk
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              key: password
              name: stube-db-k88fgb59hk
        - name: PG_URL
          value: postgres://$(DB_USER):$(DB_PASSWORD)@postgres:5432/stube?sslmode=disable
        - name: STREAM_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              key: key
              name: stube-stream-signing-55c926tf47
        envFrom:
        - configMapRef:
            name: stube-env-bc6ctgt9bg
        image: ghcr.io/nalet/stube/chino-api:latest
        name: app
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
      initContainers:
      - command:
        - sh
        - -c
        - |
          i=0
          until curl -sf -o /dev/null http://keycloak/auth/realms/stube/.well-known/openid-configuration; do
            i=$((i+1)); [ "$i" -ge 60 ] && { echo "bundled keycloak not present after 180s; proceeding"; exit 0; }
            echo "waiting for bundled keycloak ($i)…"; sleep 3
          done
          echo "bundled keycloak ready"
        image: curlimages/curl:8.11.0
        name: wait-for-oidc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: chino-stream
    app.kubernetes.io/part-of: stube
    role: stream
  name: chino-stream
  namespace: stube
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chino-stream
  template:
    metadata:
      labels:
        app: chino-stream
        role: stream
    spec:
      containers:
      - env:
        - name: LISTEN_ADDR
          value: :8080
        - name: KATALOG_API_BASE_URL
          value: http://katalog-api
        - name: MEDIA_ROOT
          value: /var/lib/stube/media
        - name: OIDC_ISSUER
          valueFrom:
            configMapKeyRef:
              key: OIDC_ISSUER
              name: stube-env-bc6ctgt9bg
        - name: OIDC_AUDIENCE
          valueFrom:
            configMapKeyRef:
              key: OIDC_AUDIENCE
              name: stube-env-bc6ctgt9bg
        - name: AUTH_ENABLED
          value: "true"
        - name: STREAM_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              key: key
              name: stube-stream-signing-55c926tf47
        - name: USE_NVENC
          value: "false"
        - name: TRANSCODE_PRESET
          value: veryfast
        - name: HLS_CACHE_DIR
          value: /var/cache/stube-hls
        - name: FFMPEG_MAX_CONCURRENT
          value: "2"
        image: ghcr.io/nalet/stube/chino-stream:latest
        name: chino-stream
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 256Mi
        volumeMounts:
        - mountPath: /var/lib/stube/media
          name: media
          readOnly: true
        - mountPath: /var/cache/stube-hls
          name: hls-cache
      initContainers:
      - command:
        - sh
        - -c
        - |
          i=0
          until curl -sf -o /dev/null http://keycloak/auth/realms/stube/.well-known/openid-configuration; do
            i=$((i+1)); [ "$i" -ge 60 ] && { echo "bundled keycloak not present after 180s; proceeding"; exit 0; }
            echo "waiting for bundled keycloak ($i)…"; sleep 3
          done
          echo "bundled keycloak ready"
        image: curlimages/curl:8.11.0
        name: wait-for-oidc
      volumes:
      - name: media
        persistentVolumeClaim:
