              name: stube-db-k88fgb59hk
        - name: PG_URL
          value: postgres://$(DB_USER):$(DB_PASSWORD)@postgres:5432/stube?sslmode=disable
        - name: STREAM_SIGNING_KEY
          valueFrom:
            secretKeyRef:
              key: key
              name: stube-stream-signing-7tt6mktkc4
        envFrom:
        - configMapRef:
            name: stube-env-622d6kcm58
