# ── katalog-manager-api: the neutral management / write API ──
# The write side of the catalog: library configuration, item create/update,
# first-run server setup. Product clients read through katalog-api; the admin
# UI and operators write through here. Served under /api/manage.
#
# Scope guard: this is the catalog's own write path. It never acquires content
# and has no notion of how files land on disk — that is out of tree.
#
# First-run: GET /api/manage/setup/status -> {"configured":bool,...}. While
# configured=false the app/proxy steers users to the admin wizard at
# /manage/setup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: katalog-manager-api
  labels: { app: katalog-manager-api, role: catalog-write, app.kubernetes.io/part-of: stube }
spec:
  replicas: 1
  selector: { matchLabels: { app: katalog-manager-api } }
  template:
    metadata:
      labels: { app: katalog-manager-api, role: catalog-write }
    spec:
      # Runs as the katalog-manager-api ServiceAccount (see rbac.yaml) so the
      # first-run setup flow can propagate config + the generated signing key to
      # stube-env / stube-stream-signing and roll the affected deployments.
      serviceAccountName: katalog-manager-api
      # Gate startup on the OIDC issuer being reachable. manage-api builds its
      # token verifier ONCE at boot; if discovery fails (bundled Keycloak not yet
      # Ready, ~80s) it serves 503 on protected routes forever (no retry/restart).
      # Wait for the issuer's discovery doc first. Skips cleanly if no issuer is
      # configured (operator using no IdP) — then protected routes 503 by design.
      initContainers:
        - name: wait-for-oidc
          image: curlimages/curl:8.11.0
          # Wait on the bundled Keycloak SERVICE name — NOT the issuer host. The
          # issuer is stube.localhost, and musl libc (Alpine) short-circuits
          # *.localhost -> 127.0.0.1 (RFC 6761), so curling the issuer here would
          # hit this pod, not Keycloak. The Go services resolve stube.localhost
          # via CoreDNS (no short-circuit), so they discover fine once Keycloak is
          # up. Bounded retry so an operator on an external IdP (no bundled
          # Keycloak) doesn't block forever — manage-api then discovers its own.
          command:
            - sh
            - -c
            - |
              i=0
              until curl -sf -o /dev/null http://keycloak/auth/realms/stube/.well-known/openid-configuration; do
                i=$((i+1)); [ "$i" -ge 60 ] && { echo "bundled keycloak not present after 180s; proceeding"; exit 0; }
                echo "waiting for bundled keycloak ($i)…"; sleep 3
              done
              echo "bundled keycloak ready"
      containers:
        - name: app
          image: ghcr.io/nalet/stube/katalog-manager-api:latest
          ports: [{ containerPort: 8080, name: http }]
          envFrom:
            # OIDC_ISSUER / OIDC_AUDIENCE / KAFKA_BROKERS live in stube-env.
            - configMapRef: { name: stube-env }
          env:
            - name: ADDR
              value: ":8080"
            # Reads the neutral catalog API in-cluster for cross-checks.
            - name: KATALOG_API_BASE_URL
              value: "http://katalog-api"
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: stube-db, key: user } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: stube-db, key: password } }
            # Config + catalog write DB.
            - name: PG_URL
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@postgres:5432/stube?sslmode=disable"
            # Optional: present so the manager can mint signed playback URLs
            # consistent with chino-api / chino-stream. Safe to leave unset.
            - name: STREAM_SIGNING_KEY
              valueFrom:
                secretKeyRef: { name: stube-stream-signing, key: key, optional: true }
            # ── Bundled Keycloak Admin REST integration (USERS_API) ──
            # The manager calls the Admin API as the confidential 'stube-manager'
            # service account (client_credentials) to manage platform users and,
            # on first run, bootstrap the bundled 'admin' password. The base URL
            # is the IN-CLUSTER Keycloak Service WITH the /auth context path, so
            # admin calls never traverse the edge proxy. Empty base URL/secret
            # disables the integration (operators using an external IdP) — the
            # /api/manage/users endpoints then return 503 and first-run skips the
            # bundled-admin bootstrap.
            - name: KEYCLOAK_BASE_URL
              # keycloak Service listens on :80 (-> container :8080), so use :80.
              value: "http://keycloak/auth"
            - name: KEYCLOAK_REALM
              value: "stube"
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: "stube-manager"
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: stube-keycloak, key: client-secret } }
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: 500m, memory: 384Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: katalog-manager-api
  labels: { app: katalog-manager-api }
spec:
  selector: { app: katalog-manager-api }
  ports: [{ name: http, port: 80, targetPort: 8080 }]
