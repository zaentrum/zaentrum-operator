apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stube
  annotations:
    # Long-form playback proxies through chino-api; the browser stops reading
    # once its buffer fills, so a short proxy read-timeout severs the stream
    # every few minutes. 4h covers any title. (Annotation key is ingress-
    # controller specific — this one is nginx; Traefik uses a ServersTransport.)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "14400"
spec:
  # Default host is stube.localhost: modern browsers auto-resolve *.localhost to
  # 127.0.0.1, so the all-in-one answers on http://stube.localhost with no
  # /etc/hosts edit, and the issuer host equals the ingress host (what a real
  # cluster does too). Operators / overlays replace this with their real name
  # — override together with stube-env OIDC_ISSUER + stube-keycloak-config
  # KC_HOSTNAME (and, on the appliance, STUBE_ISSUER_HOST).
  rules:
    - host: stube.localhost
      http:
        # ── Order matters ──
        # Ingress path matching is longest-prefix on most controllers, but we
        # list most-specific first so the intent is unambiguous and so simpler
        # routers (Traefik, the all-in-one) keep the same precedence:
        #   /api/manage -> katalog-manager-api  (neutral write API)
        #   /manage     -> admin                (management UI, SPA)
        #   /api        -> chino-api            (product BFF)
        #   /auth       -> keycloak             (bundled IdP; issuer base path)
        #   /           -> chino-web            (the main app, static SPA)
        paths:
          - path: /api/manage
            pathType: Prefix
            backend:
              service:
                name: katalog-manager-api
                port: { number: 80 }
          - path: /manage
            pathType: Prefix
            backend:
              service:
                name: admin
                port: { number: 80 }
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: chino-api
                port: { number: 80 }
          # Bundled Keycloak. Served at /auth (KC_HTTP_RELATIVE_PATH=/auth) so
          # the issuer is <host>/auth/realms/stube and the prefix maps 1:1 with
          # no rewrite. More specific than '/', so it precedes the catch-all.
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port: { number: 8080 }
          - path: /
            pathType: Prefix
            backend:
              service:
                name: chino-web
                port: { number: 80 }
