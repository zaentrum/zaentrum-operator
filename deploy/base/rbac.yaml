# ── RBAC for katalog-manager-api config propagation ──
# The management plane runs the first-run setup wizard. After it persists the
# operator's config + generates the stream signing key, it propagates those
# values out to the runtime objects the sibling services read at STARTUP — the
# zaentrum-env ConfigMap and the zaentrum-stream-signing Secret — and rolls the
# affected Deployments so the new values take effect.
#
# To do that in-cluster (via the Kubernetes REST API, stdlib net/http only — no
# client-go) it needs a ServiceAccount with a tightly-scoped, namespace-local
# Role: read + patch the two named-shape objects and restart deployments. No
# cluster-scoped permissions, no create/delete on workloads.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: katalog-manager-api
  labels: { app: katalog-manager-api, app.kubernetes.io/part-of: zaentrum }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: katalog-manager-api-config
  labels: { app: katalog-manager-api, app.kubernetes.io/part-of: zaentrum }
rules:
  # ConfigMaps + Secrets: read current state (to diff for idempotency) and
  # strategic-merge patch the OIDC issuer/audience, media root and stream
  # signing key into zaentrum-env / zaentrum-stream-signing.
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "patch", "update"]
  # Deployments: read + patch only (set the restart annotation). No create or
  # delete — the manager never owns the workload lifecycle, it only rolls pods.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  # Zaentrum CR: the instance/update surface (GET/PATCH /api/manage/instance) reads
  # the CR (spec + status) and merge-patches its spec — set channel /
  # update.mode and, on "apply", pin spec.version to the available update so the
  # operator rolls it. read + patch/update only; the operator owns create/delete
  # of the CR, the manager only turns the knobs on an existing one.
  - apiGroups: ["zaentrum.io"]
    resources: ["zaentrums"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # The status subresource is read-only here: the manager mirrors
  # currentVersion / availableUpdate / phase / components into its view but
  # never writes status (the operator's reconciler owns it).
  - apiGroups: ["zaentrum.io"]
    resources: ["zaentrums/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: katalog-manager-api-config
  labels: { app: katalog-manager-api, app.kubernetes.io/part-of: zaentrum }
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: katalog-manager-api-config
subjects:
  - kind: ServiceAccount
    name: katalog-manager-api
