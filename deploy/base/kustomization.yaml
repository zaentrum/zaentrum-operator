apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Vanilla Kubernetes base — runs on k3s/k3d, kind (CI), or any cluster.
# No OpenShift Route / ServiceMonitor / GrafanaDashboard here: those are
# operator-private overlays (see docs/architecture.md).

namespace: zaentrum

resources:
  - namespace.yaml
  - data.yaml        # postgres + valkey
  - kafka.yaml       # single-node KRaft event stream (no Zookeeper)
  - rbac.yaml        # katalog-manager-api SA + Role (first-run config propagation)
  - keycloak.yaml      # bundled OIDC provider (Deployment + Service, /auth)
  - keycloak-realm.yaml # zaentrum realm import (clients/roles/admin user)
  - platform.yaml    # katalog-api (neutral catalog read API)
  - manage.yaml      # katalog-manager-api (neutral management/write API)
  - chino.yaml       # chino-api + chino-stream + chino-web
  - admin.yaml       # management UI (React launchpad, served at /manage)
  - ingress.yaml

configMapGenerator:
  - name: zaentrum-env
    literals:
      # Bundled-IdP issuer: the PUBLIC url of the realm served by the bundled
      # Keycloak behind Traefik (<host>/auth/realms/zaentrum). Every service runs
      # OIDC discovery + token validation against this with coreos/go-oidc,
      # which requires it to EQUAL both the discovery doc's `issuer` and the
      # token `iss`. Keycloak pins this value via KC_HOSTNAME (keycloak.yaml),
      # so it is host-stable; the cluster must resolve this host to the ingress
      # (the all-in-one wires a CoreDNS rewrite to the keycloak Service; on a
      # real cluster the operator sets this, KC_HOSTNAME and the ingress host to
      # the same name — the demo overlay shows the merge). Override together
      # with deploy/base/ingress.yaml host + zaentrum-keycloak-config KC_HOSTNAME.
      - OIDC_ISSUER=http://zaentrum.localhost/auth/realms/zaentrum
      - OIDC_AUDIENCE=chino
      - OIDC_ENABLED=true
      # In-cluster service DNS — never leaves the namespace.
      - KATALOG_BASE_URL=http://katalog-api
      - STREAM_BASE_URL=http://chino-stream
      # On-disk library root the stream plane serves from. First-run setup
      # patches this to the operator's configured library path and rolls the
      # consumers; the default matches chino-stream's mounted media volume.
      - MEDIA_ROOT=/var/lib/zaentrum/media
      # Internal event stream (single-node KRaft broker). Override to a
      # managed cluster's bootstrap servers when running at scale.
      - KAFKA_BROKERS=kafka:9092
      # Empty = no admins until the operator sets Keycloak subs / realm role.
      - ADMIN_SUBJECTS=

secretGenerator:
  # DEV DEFAULTS — fine for a local appliance, CHANGE for anything exposed.
  - name: zaentrum-db
    literals:
      - user=zaentrum
      - password=zaentrum-dev-change-me
  - name: zaentrum-stream-signing
    literals:
      # Dev default — MUST be valid base64 (chino-api/chino-stream base64-decode
      # it; decodes to 32 bytes here). Regenerate for anything exposed:
      #   openssl rand -base64 32
      - key=ZGV2LW9ubHktY2hhbmdlLW1lLW5vdC1mb3ItcHJvZCE=
  # Confidential secret for the 'zaentrum-manager' service-account client. The
  # realm import substitutes ${ZAENTRUM_MANAGER_SECRET} with this value, and
  # katalog-manager-api reads it as KEYCLOAK_ADMIN_CLIENT_SECRET to call the
  # Admin REST API. DEV value — rotate for anything exposed.
  - name: zaentrum-keycloak
    literals:
      - client-secret=zaentrum-manager-dev-change-me
  # Bundled Keycloak bootstrap admin. 'username'/'password' bootstrap the
  # master-realm temporary admin; 'realm-admin-password' seeds the zaentrum-realm
  # 'admin' user (realm-admin) via the realm import with temporary=true, so the
  # first login forces a password change. DEV values — change for anything
  # exposed.
  - name: zaentrum-keycloak-admin
    literals:
      - username=admin
      - password=dev
      - realm-admin-password=dev

images:
  - name: ghcr.io/zaentrum/chino-web
    newTag: latest
  - name: ghcr.io/zaentrum/chino-api
    newTag: latest
  - name: ghcr.io/zaentrum/chino-stream
    newTag: latest
  - name: ghcr.io/zaentrum/katalog-api
    newTag: latest
  - name: ghcr.io/zaentrum/katalog-manager
    newTag: latest
  - name: ghcr.io/zaentrum/admin
    newTag: latest
  - name: ghcr.io/zaentrum/keycloak
    newTag: latest
