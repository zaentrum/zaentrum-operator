# Lighter front door for a NAS / single box. Same images as the k8s base.
# Software transcode by default (no GPU). For HW transcode use the k3s
# appliance + GPU overlay, or add an NVIDIA device reservation here.
#
# A single Caddy reverse proxy fronts everything on :8080, matching the k8s
# route map:
#   /api/manage -> katalog-manager-api   (neutral write API)
#   /manage     -> admin                 (management UI, SPA)
#   /api        -> chino-api             (product BFF)
#   /           -> chino-web             (the main app, static SPA)
name: stube

x-env: &oidc
  OIDC_ISSUER: ""          # set to your server's OIDC issuer, or leave blank for first-run setup
  OIDC_AUDIENCE: "chino"

services:
  proxy:
    image: caddy:2-alpine
    ports: ["8080:80"]     # the only published port — everything routes through here
    volumes:
      - "./Caddyfile:/etc/caddy/Caddyfile:ro"
    depends_on: [chino-web, chino-api, admin, katalog-manager-api]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stube
      POSTGRES_PASSWORD: stube-dev-change-me
      POSTGRES_DB: stube
    volumes: ["pg:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD", "pg_isready", "-U", "stube"], interval: 10s, retries: 5 }

  valkey:
    image: valkey/valkey:8-alpine

  # Single-node KRaft broker (no Zookeeper) for the internal event stream.
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@127.0.0.1:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "CLIENT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "CLIENT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CLIENT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "CLIENT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_NUM_PARTITIONS: "1"
      CLUSTER_ID: "stube-kraft-0000000000001"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    volumes: ["kafka:/var/lib/kafka/data"]

  katalog-api:
    image: ghcr.io/nalet/stube/katalog-api:latest
    environment:
      <<: *oidc
      KATALOG_API_PG_URL: "postgres://stube:stube-dev-change-me@postgres:5432/stube?sslmode=disable"
    depends_on: { postgres: { condition: service_healthy } }

  # Neutral management / write API. Served under /api/manage.
  katalog-manager-api:
    image: ghcr.io/nalet/stube/katalog-manager-api:latest
    environment:
      <<: *oidc
      ADDR: ":8080"
      KATALOG_API_BASE_URL: "http://katalog-api:8080"
      KAFKA_BROKERS: "kafka:9092"
      PG_URL: "postgres://stube:stube-dev-change-me@postgres:5432/stube?sslmode=disable"
      STREAM_SIGNING_KEY: "dev-only-stream-signing-key-change-me"
    depends_on:
      postgres: { condition: service_healthy }
      katalog-api: { condition: service_started }
      kafka: { condition: service_started }

  chino-api:
    image: ghcr.io/nalet/stube/chino-api:latest
    environment:
      <<: *oidc
      KATALOG_BASE_URL: "http://katalog-api:8080"
      STREAM_BASE_URL: "http://chino-stream:8080"
      PG_URL: "postgres://stube:stube-dev-change-me@postgres:5432/stube?sslmode=disable"
      STREAM_SIGNING_KEY: "dev-only-stream-signing-key-change-me"
    depends_on: [katalog-api, chino-stream]

  chino-stream:
    image: ghcr.io/nalet/stube/chino-stream:latest
    environment:
      <<: *oidc
      KATALOG_API_BASE_URL: "http://katalog-api:8080"
      MEDIA_ROOT: "/media"
      USE_NVENC: "false"
      STREAM_SIGNING_KEY: "dev-only-stream-signing-key-change-me"
    volumes:
      - "${STUBE_MEDIA:-./media}:/media:ro"   # ← your library (files you own)

  chino-web:
    image: ghcr.io/nalet/stube/chino-web:latest
    depends_on: [chino-api]

  # Management UI (React launchpad, static SPA). Built with router basename
  # "/manage"; the proxy serves it at /manage and first run opens /manage/setup.
  admin:
    image: ghcr.io/nalet/stube/admin:latest
    depends_on: [katalog-manager-api]

volumes:
  pg:
  kafka:
